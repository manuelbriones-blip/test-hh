<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eva HuliHealth · Activar Llamada</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0f0d;
    --surface: #111a15;
    --surface2: #162019;
    --border: #1e3025;
    --accent: #2dff7a;
    --accent-dim: #1a9946;
    --accent-glow: rgba(45, 255, 122, 0.15);
    --text: #e8f5ec;
    --text-muted: #6b8f74;
    --text-dim: #3a5a42;
    --danger: #ff4d6d;
    --cr: #00b4d8;
    --mx: #2dff7a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(45,255,122,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(45,255,122,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* Ambient glow */
  body::after {
    content: '';
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(45,255,122,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .container {
    width: 100%;
    max-width: 480px;
    padding: 24px;
    position: relative;
    z-index: 1;
    animation: fadeUp 0.6s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 40px;
  }

  .logo-ring {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
    position: relative;
    box-shadow: 0 0 30px var(--accent-glow), inset 0 0 20px var(--accent-glow);
  }

  .logo-ring::before {
    content: '';
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    border: 1px solid rgba(45,255,122,0.15);
    animation: pulse-ring 2.5s ease-in-out infinite;
  }

  .logo-ring::after {
    content: '';
    position: absolute;
    inset: -16px;
    border-radius: 50%;
    border: 1px solid rgba(45,255,122,0.07);
    animation: pulse-ring 2.5s ease-in-out infinite 0.4s;
  }

  @keyframes pulse-ring {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(1.05); }
  }

  .logo-icon {
    font-size: 28px;
    line-height: 1;
  }

  .header h1 {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  .header h1 span {
    color: var(--accent);
  }

  .header p {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 6px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  .field-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
  }

  /* Country selector */
  .country-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 28px;
  }

  .country-btn {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--text-muted);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 600;
  }

  .country-btn:hover {
    border-color: var(--accent-dim);
    color: var(--text);
  }

  .country-btn.active {
    border-color: var(--accent);
    background: var(--accent-glow);
    color: var(--text);
    box-shadow: 0 0 16px var(--accent-glow);
  }

  .country-btn .flag {
    font-size: 20px;
    line-height: 1;
  }

  .country-btn .info {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 2px;
  }

  .country-btn .code {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
  }

  .country-btn.active .code {
    color: var(--accent);
  }

  .country-btn .name {
    font-size: 11px;
    color: inherit;
  }

  /* Phone input */
  .phone-wrapper {
    display: flex;
    align-items: center;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 28px;
    transition: border-color 0.2s;
  }

  .phone-wrapper:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .prefix-display {
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    font-weight: 500;
    color: var(--accent);
    padding: 16px 14px;
    border-right: 1px solid var(--border);
    background: rgba(45,255,122,0.05);
    white-space: nowrap;
    min-width: 72px;
    text-align: center;
    transition: all 0.2s;
  }

  .phone-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    padding: 16px;
    font-family: 'DM Mono', monospace;
    font-size: 18px;
    color: var(--text);
    letter-spacing: 1px;
  }

  .phone-input::placeholder {
    color: var(--text-dim);
    letter-spacing: 0;
  }

  /* Divider */
  .divider {
    height: 1px;
    background: var(--border);
    margin-bottom: 28px;
  }

  /* Preview */
  .preview {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .preview .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent-dim);
    flex-shrink: 0;
  }

  .preview .number {
    color: var(--text);
    font-weight: 500;
  }

  /* Call button */
  .call-btn {
    width: 100%;
    padding: 18px;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: #0a0f0d;
    cursor: pointer;
    letter-spacing: 0.3px;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    position: relative;
    overflow: hidden;
  }

  .call-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 50%);
  }

  .call-btn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(45,255,122,0.4);
  }

  .call-btn:active:not(:disabled) {
    transform: translateY(0);
  }

  .call-btn:disabled {
    background: var(--border);
    color: var(--text-dim);
    cursor: not-allowed;
    box-shadow: none;
  }

  .call-btn:disabled::before { display: none; }

  /* Status */
  .status-box {
    margin-top: 20px;
    padding: 14px 16px;
    border-radius: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    display: none;
    align-items: flex-start;
    gap: 10px;
    animation: fadeUp 0.3s ease both;
  }

  .status-box.show { display: flex; }

  .status-box.loading {
    background: rgba(45,255,122,0.06);
    border: 1px solid rgba(45,255,122,0.2);
    color: var(--accent);
  }

  .status-box.success {
    background: rgba(45,255,122,0.08);
    border: 1px solid rgba(45,255,122,0.3);
    color: var(--accent);
  }

  .status-box.error {
    background: rgba(255,77,109,0.08);
    border: 1px solid rgba(255,77,109,0.3);
    color: var(--danger);
  }

  .spinner {
    width: 14px;
    height: 14px;
    border: 2px solid rgba(45,255,122,0.3);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
    margin-top: 1px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .status-icon { flex-shrink: 0; font-size: 14px; }

  /* Footer */
  .footer {
    text-align: center;
    margin-top: 28px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
  }

  /* Calling animation overlay */
  .calling-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,15,13,0.95);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 20px;
  }

  .calling-overlay.show { display: flex; }

  .calling-rings {
    position: relative;
    width: 100px;
    height: 100px;
  }

  .calling-rings .ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 2px solid var(--accent);
    animation: expand 2s ease-out infinite;
  }

  .calling-rings .ring:nth-child(2) { animation-delay: 0.5s; }
  .calling-rings .ring:nth-child(3) { animation-delay: 1s; }

  @keyframes expand {
    0% { transform: scale(0.5); opacity: 0.8; }
    100% { transform: scale(2); opacity: 0; }
  }

  .calling-rings .center {
    position: absolute;
    inset: 50%;
    transform: translate(-50%, -50%);
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
  }

  .calling-text {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
  }

  .calling-number {
    font-family: 'DM Mono', monospace;
    font-size: 20px;
    color: var(--accent);
    letter-spacing: 2px;
  }

  .cancel-btn {
    margin-top: 12px;
    padding: 10px 24px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .cancel-btn:hover {
    border-color: var(--danger);
    color: var(--danger);
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="logo-ring">
      <span class="logo-icon">🤍</span>
    </div>
    <h1>Eva <span>HuliHealth</span></h1>
    <p>Agente de salud · Activar llamada</p>
  </div>

  <div class="card">
    <!-- Country -->
    <div class="field-label">Selecciona país</div>
    <div class="country-grid">
      <button class="country-btn active" onclick="selectCountry(this, '+52')" data-prefix="+52">
        <span class="flag">🇲🇽</span>
        <div class="info">
          <span class="code">+52</span>
          <span class="name">México</span>
        </div>
      </button>
      <button class="country-btn" onclick="selectCountry(this, '+506')" data-prefix="+506">
        <span class="flag">🇨🇷</span>
        <div class="info">
          <span class="code">+506</span>
          <span class="name">Costa Rica</span>
        </div>
      </button>
    </div>

    <!-- Phone -->
    <div class="field-label">Número de teléfono</div>
    <div class="phone-wrapper">
      <div class="prefix-display" id="prefixDisplay">+52</div>
      <input
        type="tel"
        class="phone-input"
        id="phoneInput"
        placeholder="5512345678"
        maxlength="15"
        oninput="onPhoneInput(this)"
      />
    </div>

    <div class="divider"></div>

    <!-- Preview -->
    <div class="preview">
      <div class="dot"></div>
      <span>Enviará: <span class="number" id="fullNumber">+52 ···</span></span>
    </div>

    <!-- Button -->
    <button class="call-btn" id="callBtn" onclick="triggerCall()" disabled>
      <span>📞</span> Activar llamada con Eva
    </button>

    <!-- Status -->
    <div class="status-box" id="statusBox">
      <span class="status-icon" id="statusIcon"></span>
      <span id="statusText"></span>
    </div>
  </div>

  <div class="footer">Eva HuliHealth · Powered by Dapta AI</div>
</div>

<!-- Calling Overlay -->
<div class="calling-overlay" id="callingOverlay">
  <div class="calling-rings">
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="center">📞</div>
  </div>
  <div class="calling-text">Conectando con Eva…</div>
  <div class="calling-number" id="overlayNumber">+52</div>
  <button class="cancel-btn" onclick="hideOverlay()">Cerrar</button>
</div>

<script>
  const WEBHOOK_URL = 'https://api.dapta.ai/api/76b0fc9a51e86ac9/test-v2?x-api-key=sQqRP-76b0fc9a-c51a-4768-a90e-92ee51e86ac9-a';

  let selectedPrefix = '+52';

  function selectCountry(btn, prefix) {
    document.querySelectorAll('.country-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedPrefix = prefix;
    document.getElementById('prefixDisplay').textContent = prefix;
    updatePreview();
  }

  function onPhoneInput(input) {
    // Only allow digits
    input.value = input.value.replace(/\D/g, '');
    updatePreview();
  }

  function updatePreview() {
    const num = document.getElementById('phoneInput').value;
    const fullNum = num ? `${selectedPrefix}${num}` : `${selectedPrefix} ···`;
    document.getElementById('fullNumber').textContent = fullNum;
    document.getElementById('callBtn').disabled = num.length < 7;
  }

  function setStatus(type, text) {
    const box = document.getElementById('statusBox');
    const icon = document.getElementById('statusIcon');
    const textEl = document.getElementById('statusText');

    box.className = `status-box show ${type}`;
    textEl.textContent = text;

    if (type === 'loading') {
      icon.innerHTML = '<div class="spinner"></div>';
    } else if (type === 'success') {
      icon.textContent = '✓';
    } else {
      icon.textContent = '✗';
    }
  }

  function hideOverlay() {
    document.getElementById('callingOverlay').classList.remove('show');
  }

  async function triggerCall() {
    const num = document.getElementById('phoneInput').value.trim();
    if (!num || num.length < 7) return;

    const phone = `${selectedPrefix}${num}`;
    const btn = document.getElementById('callBtn');

    // Show overlay
    document.getElementById('overlayNumber').textContent = phone;
    document.getElementById('callingOverlay').classList.add('show');

    btn.disabled = true;
    setStatus('loading', 'Enviando solicitud al agente Eva…');

    try {
      const response = await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone })
      });

      if (response.ok) {
        setStatus('success', `¡Llamada activada! Eva marcará al ${phone} en breve.`);
        setTimeout(hideOverlay, 2000);
      } else {
        const errText = await response.text();
        setStatus('error', `Error ${response.status}: ${errText || 'No se pudo activar la llamada.'}`);
        hideOverlay();
      }
    } catch (err) {
      setStatus('error', `Error de red: ${err.message}`);
      hideOverlay();
    } finally {
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
